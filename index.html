<!-- index.html -->

<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/vite.svg" />
  <link rel="stylesheet" href="/src/assets/css/style.css">
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
  <title>Kalkulator przepisów lasagne</title>
</head>

<body>
  <!-- Header-->
  <header>
    <h1 class="main-header">Kalkulator przepisów</h1>
    <!-- Navigation -->
    <nav class="navbar">
      <ul class="nav-ul">
        <li class="nav-li"><a href="#home">Strona główna</a></li>
        <li class="nav-li"><a href="#recipes">Przepisy</a></li>
        <li class="nav-li"><a href="#about">O nas</a></li>
      </ul>
    </nav>
  </header>
  <!-- Main Content -->
  <main class="main-content">
    <h2 class="main-title">Witaj w kalkulatorze przepisów lasagne!</h2>
    <!-- Article -->
    <article class="pages" id="home">
      <!-- Section: SVG -->
      <section class="carousel-wrapper">
        <div class="lasagne-container">
          <svg id="lasagne-svg" viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg">
            <!-- Naczynie do zapiekania (warstwa pod makaronem) -->
            <path id="dish" d="M50,250 L350,250 L320,100 L80,100 Z" fill="none" stroke="#ccc" stroke-width="2" />

            <!-- Tutaj będziemy dynamicznie wstrzykiwać warstwy za pomocą JS -->
            <g id="layers-group"></g>

            <!-- Przykładowa pojedyncza warstwa (do testów stylu) -->
            <!-- <rect class="layer" x="70" y="220" width="260" height="20" rx="5" fill="#f0e68c" /> -->
          </svg>
        </div>
      </section>
      <!-- Section: calc-container -->
      <section class="calc-wrapper">
        <div id="params-card" class="card">
          <h3>Parametry lasagne</h3>
          <form id="lasagne-form">
            <div class="form-group">
              <label for="lasagne-type">Typ lasagne</label>
              <select id="lasagne-type" name="lasagne-type">
                <option value="standard">Standard</option>
                <option value="vegan">Wegańska</option>
                <option value="gluten-free">Bezglutenowa</option>
              </select>
            </div>

            <div class="form-group">
              <label for="tray-size">Rozmiar blachy do pieczenia</label>
              <select id="tray-size" name="tray-size">
                <option value="small">25x30 cm</option>
                <option value="midi">25x36 cm</option>
                <option value="large">25x40 cm</option>
              </select>
            </div>
            <div class="form-group">
              <label for="layers">Liczba warstw</label>
              <input type="number" id="layers" min="1" value="1">
            </div>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label for="total-time">Całkowity czas pieczenia (min)</label>
            <input type="number" id="total-time" value="" disabled>
          </div>
          <div class="form-group">
            <label for="elapsed-time">Ile minut już się piecze?</label>
            <input type="number" id="elapsed-time" min="0" value="0">
          </div>
        </div>

        <button type="button" id="calculate-btn">Oblicz przepis</button>
        </form>

        <div id="result-display" class="result-area">
          <p>Czas pozostały: <span id="remaining-time">-- </span><span id="unit">min</span></p>
        </div>
        </div>
      </section>
    </article>
    <article class="pages" id="recipes">Przepisy</article>
    <article class="pages" id="about">O nas</article>
  </main>
  <footer>
    <p>&copy; 2023 Kalkulator przepisów. Wszelkie prawa zastrzeżone.</p>
  </footer>
  <script type="module" src="/src/assets/js/app.js"></script>
</body>

</html>
